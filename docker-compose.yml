services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devconf
      POSTGRES_PASSWORD: devconf
      POSTGRES_DB: devconf
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devconf"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://devconf:devconf@db:5432/devconf
    command: sh -c "uv run alembic upgrade head && uv run python -m app.seed && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "18000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "13000:5173"
    depends_on:
      - api
